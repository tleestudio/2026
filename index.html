<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tai-li Lee</title>

<style>

body {
  margin: 0;
  font-family: sans-serif;
  background: black;
}

.wrapper {
  max-width: 900px;
  margin: 0 auto;
  padding: 20px;
}

img {
  width: 100%;
  max-height: 85vh;
  object-fit: cover;
  display: block;
  margin-bottom: 20px;

  opacity: 0;
  transform: translateY(40px);
  transition: all 0.8s ease;
}

img.visible {
  opacity: 1;
  transform: translateY(0);
}

</style>
</head>

<body>

<div class="wrapper">

<img src="tlee26-1a.webp" class="visible">
<img src="tlee26-2a.webp" loading="lazy">
<img src="tlee26-3a.webp" loading="lazy">
<img src="tlee26-4a.webp" loading="lazy">
<img src="tlee26-5a.webp" loading="lazy">
<img src="tlee26-6a.webp" loading="lazy">
<img src="tlee26-7a.webp" loading="lazy">
<img src="tlee26-8a.webp" loading="lazy">
<img src="tlee26-9a.webp" loading="lazy">
<img src="tlee26-10a.webp" loading="lazy">
<img src="tlee26-11a.webp" loading="lazy">
<img src="tlee26-12a.webp" loading="lazy">
<img src="tlee26-13a.webp" loading="lazy">
<img src="tlee26-14a.webp" loading="lazy">
<img src="tlee26-15a.webp" loading="lazy">

</div>

<script>

const images = document.querySelectorAll("img");

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add("visible");
    }
  });
});

images.forEach(img => observer.observe(img));

</script>

</body>
</html>
