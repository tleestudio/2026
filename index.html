<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Image Page</title>

<style>

body {
  margin: 0;
  font-family: sans-serif;
  background: black;
}

.wrapper {
  max-width: 900px;
  margin: 0 auto;
  padding: 20px;
}

img {
  width: 100%;
  max-height: 85vh;
  object-fit: cover;
  display: block;
  margin-bottom: 20px;

  opacity: 0;
  transform: translateY(40px);
  transition: all 0.8s ease;
}

img.visible {
  opacity: 1;
  transform: translateY(0);
}

</style>
</head>

<body>

<div class="wrapper">

<img src="image1.jpg" class="visible">
<img src="image2.jpg">
<img src="image3.jpg">
<img src="image4.jpg">
<img src="image5.jpg">

</div>

<script>

const images = document.querySelectorAll("img");

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add("visible");
    }
  });
});

images.forEach(img => observer.observe(img));

</script>

</body>
</html>
